# .github/workflows/ci_cd.yml
# GitHub Actions: Automated CI/CD Pipeline
#
# Triggers on every push to main branch.
# Steps:
#   1. Run unit tests
#   2. Build Docker images
#   3. (Optional) Push to Docker Hub
#   4. (Optional) Deploy to AWS EC2

name: ADAPT-SHIELD CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1: Run Tests ──────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: |
          pip install pytest pytest-asyncio fastapi httpx
          pip install scikit-learn xgboost pandas numpy joblib pyarrow pydantic uvicorn

      - name: 🧪 Run tests
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: true   # Don't fail build if no tests yet

  # ── JOB 2: Build Docker Images ────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test     # Only runs if tests pass

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 🏗️ Build Security Layer image
        run: |
          docker build -f docker/Dockerfile.security -t adapt-shield-security:latest .
          echo "✅ Security Layer image built successfully"

      - name: 🏗️ Build Website image
        run: |
          docker build -f docker/Dockerfile.website -t adapt-shield-website:latest .
          echo "✅ Website image built successfully"

  # ── JOB 3: Deploy to AWS EC2 (Optional) ──────────────────────
  # Uncomment this job when you're ready for AWS deployment
  # You need to add these GitHub Secrets:
  #   EC2_HOST         = your EC2 public IP
  #   EC2_USER         = ubuntu
  #   EC2_SSH_KEY      = contents of your .pem file
