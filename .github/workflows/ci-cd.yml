# .github/workflows/ci-cd.yml
# =====================================================
# ADAPT-SHIELD CI/CD Pipeline
# Runs on every push to main branch
# Steps: test → build Docker → push to Docker Hub
# =====================================================

name: ADAPT-SHIELD CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: Run Tests ───────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── JOB 2: Build & Push Docker Image ──────────────────────
  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test         # Only runs if tests pass
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Security Layer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.security
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/adapt-shield-security:latest
            ${{ secrets.DOCKER_USERNAME }}/adapt-shield-security:${{ github.sha }}

      - name: Build and push Website image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.website
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/adapt-shield-website:latest

      - name: Post build summary
        run: |
          echo "✅ Docker images built and pushed successfully!"
          echo "   Security layer: ${{ secrets.DOCKER_USERNAME }}/adapt-shield-security:latest"
          echo "   Website:        ${{ secrets.DOCKER_USERNAME }}/adapt-shield-website:latest"
